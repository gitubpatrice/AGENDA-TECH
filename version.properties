# Source unique de vérité de la version publiée.
#
# versionCode DOIT être strictement croissant : Android refuse d'installer un APK dont le
# versionCode est inférieur à celui déjà installé — l'utilisateur voit juste un échec incompréhensible.
# Il était auparavant dérivé de `git rev-list --count HEAD`, ce qui le rendait fragile :
#   - un rebase / squash / une greffe d'historique le fait BAISSER ;
#   - un build hors dépôt git (archive source) retombait silencieusement à 1.
# Le figer ici le rend explicite, reproductible et indépendant de l'historique.
#
# À bumper À LA MAIN à chaque release (et seulement là), avant de builder l'APK.
# 47 = la v0.5.0 publiée (release GitHub du 15/07/2026).
versionCode=47
versionName=0.5.0
